<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    <title>Sufi's Clipboard</title>
</head>
<body class="bg-light">

    <div id="drag-drop-overlay" class="drag-overlay d-none">
        <div class="overlay-box text-center text-white">
            <i class="bi bi-cloud-arrow-up-fill display-1 mb-3"></i>
            <h2>Drop anywhere to instantly upload your asset</h2>
        </div>
    </div>

    <div id="login-section" class="container mt-5 {% if not login_required %}d-none{% endif %}">
        <div class="card mx-auto shadow-sm" style="max-width: 400px; border-top: 5px solid #1a73e8;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🔒 Unlock Clipboard</h3>
                <input type="text" id="user-input" class="form-control mb-3" placeholder="Username">
                <input type="password" id="pass-input" class="form-control mb-3" placeholder="Password">
                <button onclick="login()" class="btn btn-primary w-100">Login</button>
                <p id="login-error" class="text-danger mt-2 d-none text-center small">Invalid Credentials</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="container-fluid mt-4 {% if login_required %}d-none{% endif %}">
        <div class="row px-md-4">
            
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="card shadow-sm border-0 p-3 sticky-top" style="top: 20px; z-index: 100;">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h5 class="fw-bold mb-0 text-secondary"><i class="bi bi-folder2-open me-2"></i>Folders</h5>
                        <button class="btn btn-sm btn-outline-primary py-0 px-2" onclick="promptCreateFolder()">+</button>
                    </div>
                    <div class="list-group list-group-flush custom-sidebar-list" id="folder-sidebar-items">
                        <button onclick="switchFolder('')" class="list-group-item list-group-item-action active border-0 roundedmb-1" id="folder-all">
                            <i class="bi bi-grid-1x2-fill me-2"></i> All Clips
                        </button>
                        <button onclick="switchFolder('none')" class="list-group-item list-group-item-action border-0 rounded mb-1" id="folder-none">
                            <i class="bi bi-archive me-2"></i> Unassigned
                        </button>
                        </div>
                    <hr class="text-muted">
                    <button onclick="logout()" class="btn btn-sm btn-outline-danger w-100"><i class="bi bi-box-arrow-left me-2"></i>Logout</button>
                </div>
            </div>

            <div class="col-lg-9 col-md-8">
                <div class="card card-body shadow-sm border-0 mb-4 p-3">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                                <input type="text" id="search" class="form-control border-start-0 ps-0" placeholder="Search parameters...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <input type="date" id="date-filter" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <select id="sort-filter" class="form-select" onchange="loadItems()">
                                <option value="date_desc">Newest First</option>
                                <option value="date_asc">Oldest First</option>
                                <option value="size_desc">Size (Large → Small)</option>
                                <option value="size_asc">Size (Small → Large)</option>
                                <option value="title_asc">Alphabetical (A-Z)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#addItemModal"><i class="bi bi-plus-lg me-1"></i> Add</button>
                        </div>
                    </div>
                </div>

                <div class="alert alert-primary mb-4 shadow-sm text-center border-0 py-2">
                    <i class="bi bi-info-circle-fill me-2"></i><b>Ctrl + V</b> keys or dragging items directly inside this tab records them instantly.
                </div>
                
                <div id="items-list" class="row g-3"></div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 bg-light">
                    <h5 class="modal-title fw-bold" id="addItemLabel">Create Custom Entry</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="item-folder-select" class="form-label fw-semibold">Destination Target</label>
                        <select class="form-select" id="item-folder-select"></select>
                    </div>
                    <div class="mb-3">
                        <label for="item-title" class="form-label fw-semibold">Label Descriptive Alias (Optional)</label>
                        <input type="text" class="form-control" id="item-title" placeholder="Filename pattern or identifier">
                    </div>
                    <div class="mb-3">
                        <label for="item-type-select" class="form-label fw-semibold">Payload Type Category</label>
                        <select class="form-select" id="item-type-select" onchange="toggleInputType()">
                            <option value="text">Text Snippet</option>
                            <option value="file">Universal File Upload Asset</option>
                        </select>
                    </div>
                    <div class="mb-3" id="text-input-group">
                        <label for="item-content" class="form-label fw-semibold">Content Plain Body</label>
                        <textarea class="form-control" id="item-content" rows="4" placeholder="Type or paste payload metadata straight inside here..."></textarea>
                    </div>
                    <div class="mb-3 d-none" id="image-input-group">
                        <label for="item-image" class="form-label fw-semibold">Select Target Payload File</label>
                        <input type="file" class="form-control" id="item-image">
                        <div class="form-text text-muted mt-1 small">Note: Upload paths switch to decentralized Vercel Blob architecture seamlessly.</div>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-sm px-3" onclick="submitAddItem()">Save Item</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
