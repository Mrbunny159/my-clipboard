<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <title>Sufi's Clipboard</title>
</head>
<body class="bg-light">

    <div id="login-section" class="container mt-5 {% if not login_required %}d-none{% endif %}">
        <div class="card mx-auto shadow-sm" style="max-width: 400px; border-top: 5px solid #1a73e8;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🔒 Unlock Clipboard</h3>
                <input type="text" id="user-input" class="form-control mb-3" placeholder="Username">
                <input type="password" id="pass-input" class="form-control mb-3" placeholder="Password">
                <button onclick="login()" class="btn btn-primary w-100">Login</button>
                <p id="login-error" class="text-danger mt-2 d-none text-center small">Invalid Credentials</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="container mt-4 {% if login_required %}d-none{% endif %}">
        <div class="header-bar d-md-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-3 mb-md-0">☁️ Personal Clipboard</h2>
            <div class="d-flex gap-2">
                <input type="text" id="search" class="form-control" placeholder="Search title or content...">
                <input type="date" id="date-filter" class="form-control">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addItemModal">+ Add</button>
                <button onclick="logout()" class="btn btn-outline-danger">Logout</button>
            </div>
        </div>
        
        <div class="alert alert-primary mb-4 text-center">
            Ready! Just press <b>Ctrl + V</b> to save text or images instantly, or use the <b>+ Add</b> button.
        </div>
        
        <div id="items-list" class="row"></div>
    </div>

    <!-- Add Item Modal -->
    <div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addItemLabel">Add New Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="item-title" class="form-label">Title (optional)</label>
                        <input type="text" class="form-control" id="item-title" placeholder="Give your item a title">
                    </div>
                    <div class="mb-3">
                        <label for="item-type-select" class="form-label">Type</label>
                        <select class="form-select" id="item-type-select" onchange="toggleInputType()">
                            <option value="text">Text</option>
                            <option value="image">Image</option>
                        </select>
                    </div>
                    <div class="mb-3" id="text-input-group">
                        <label for="item-content" class="form-label">Content</label>
                        <textarea class="form-control" id="item-content" rows="4" placeholder="Enter your text here"></textarea>
                    </div>
                    <div class="mb-3 d-none" id="image-input-group">
                        <label for="item-image" class="form-label">Select Image</label>
                        <input type="file" class="form-control" id="item-image" accept="image/*">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitAddItem()">Save Item</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
